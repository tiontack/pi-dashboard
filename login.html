<!DOCTYPE html>
<html lang="ko">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mySUNI PI - 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #6366F1; --primary-light: #818CF8; --primary-dark: #4F46E5;
}
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #1E1B4B 0%, #312E81 30%, #3730A3 60%, #1E1B4B 100%);
  overflow: hidden; position: relative;
}

/* Animated background shapes */
.bg-shape {
  position: absolute; border-radius: 50%; opacity: .07; pointer-events: none;
  animation: floatShape 20s ease-in-out infinite;
}
.bg-shape:nth-child(1) { width: 500px; height: 500px; top: -120px; left: -100px; background: #818CF8; animation-duration: 22s; }
.bg-shape:nth-child(2) { width: 350px; height: 350px; bottom: -80px; right: -60px; background: #6366F1; animation-duration: 18s; animation-delay: -5s; }
.bg-shape:nth-child(3) { width: 250px; height: 250px; top: 40%; left: 60%; background: #A78BFA; animation-duration: 25s; animation-delay: -10s; }
@keyframes floatShape {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -20px) scale(1.05); }
  50% { transform: translate(-20px, 30px) scale(.95); }
  75% { transform: translate(15px, 15px) scale(1.02); }
}

.login-container {
  position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px;
}

.login-card {
  background: rgba(255,255,255,.95); backdrop-filter: blur(20px);
  border-radius: 24px; padding: 48px 40px 40px; box-shadow: 0 24px 64px rgba(0,0,0,.25);
  border: 1px solid rgba(255,255,255,.2);
}

.login-logo {
  text-align: center; margin-bottom: 32px;
}
.login-logo img { height: 36px; margin-bottom: 10px; }
.login-logo .logo-title {
  font-size: .85rem; font-weight: 700; color: #6366F1; letter-spacing: .08em; text-transform: uppercase;
}
.login-logo .logo-subtitle {
  font-size: .78rem; color: #9CA3AF; margin-top: 4px; font-weight: 500;
}

.form-group { margin-bottom: 18px; }
.form-group label {
  display: block; font-size: .82rem; font-weight: 700; color: #4B5563; margin-bottom: 6px; letter-spacing: .01em;
}
.form-input {
  width: 100%; padding: 12px 16px; border: 2px solid #E5E7EB; border-radius: 12px;
  font-size: .95rem; font-family: inherit; background: #fff; transition: all .2s; color: #1E1B4B;
}
.form-input:focus {
  outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99,102,241,.12);
}
.form-input::placeholder { color: #C5C7CC; }

.login-btn {
  width: 100%; padding: 13px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, #6366F1, #4F46E5); color: #fff;
  font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .25s; font-family: inherit;
  margin-top: 6px; letter-spacing: .02em;
}
.login-btn:hover { background: linear-gradient(135deg, #4F46E5, #4338CA); box-shadow: 0 6px 20px rgba(99,102,241,.35); transform: translateY(-1px); }
.login-btn:active { transform: translateY(0); }

.admin-link {
  text-align: center; margin-top: 20px;
}
.admin-link button {
  background: none; border: none; color: #9CA3AF; font-size: .8rem; cursor: pointer;
  font-family: inherit; font-weight: 500; transition: color .2s;
}
.admin-link button:hover { color: var(--primary); }

.error-msg {
  display: none; background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA;
  border-radius: 10px; padding: 10px 14px; font-size: .85rem; font-weight: 600;
  margin-bottom: 16px; text-align: center;
}
.error-msg.show { display: block; animation: shake .4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }

/* Admin login overlay */
.admin-overlay {
  display: none; position: fixed; inset: 0; background: rgba(30,27,75,.5); backdrop-filter: blur(4px);
  z-index: 10; align-items: center; justify-content: center;
}
.admin-overlay.open { display: flex; }
.admin-modal {
  background: #fff; border-radius: 20px; padding: 36px 32px; width: 90%; max-width: 360px;
  box-shadow: 0 16px 48px rgba(0,0,0,.2); text-align: center;
}
.admin-modal h3 { font-size: 1.05rem; font-weight: 800; color: #1E1B4B; margin-bottom: 18px; }
.admin-modal .form-input { margin-bottom: 14px; }
.admin-modal-actions { display: flex; gap: 10px; margin-top: 6px; }
.admin-modal-actions button { flex: 1; padding: 10px; border-radius: 10px; font-size: .9rem; font-weight: 600; cursor: pointer; font-family: inherit; }
.admin-modal-actions .cancel-btn { background: #F3F4F6; border: none; color: #6B7280; }
.admin-modal-actions .cancel-btn:hover { background: #E5E7EB; }
.admin-modal-actions .confirm-btn { background: var(--primary); border: none; color: #fff; }
.admin-modal-actions .confirm-btn:hover { background: var(--primary-dark); }
</style>
</head>

<div class="bg-shape"></div>
<div class="bg-shape"></div>
<div class="bg-shape"></div>

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="mySUNI">
      <div class="logo-title">PI Management Dashboard</div>
      <div class="logo-subtitle">성과 지표 관리 시스템</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>이름 (한글)</label>
        <input class="form-input" type="text" id="loginName" placeholder="예: 홍길동" required autofocus>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input class="form-input" type="password" id="loginPw" placeholder="영어 이름 (First Name)" required>
      </div>
      <button type="submit" class="login-btn">로그인</button>
    </form>

    <div class="admin-link">
      <button onclick="openAdminLogin()">관리자 로그인</button>
    </div>
  </div>
</div>

<!-- Admin login modal -->
<div class="admin-overlay" id="adminOverlay" onclick="if(event.target===this)closeAdminLogin()">
  <div class="admin-modal">
    <h3>관리자 로그인</h3>
    <div class="error-msg" id="adminError"></div>
    <form onsubmit="handleAdminLogin(event)">
      <input class="form-input" type="password" id="adminPw" placeholder="관리자 비밀번호" required>
      <div class="admin-modal-actions">
        <button type="button" class="cancel-btn" onclick="closeAdminLogin()">취소</button>
        <button type="submit" class="confirm-btn">로그인</button>
      </div>
    </form>
  </div>
</div>

const USER_STORAGE_KEY = 'pi_user_directory_v1';
const REPRESENTATIVE_ADMIN_NAME = '신현택';
const REPRESENTATIVE_ADMIN_ROLE = 'RF';
const ADMIN_PASSWORD = '1234';

function makeUserId(user) {
  return `${user.name_kr}__${user.dept}__${user.role}`.replace(/\s+/g, '_');
}

function normalizeUsers(users) {
  return users.map(user => ({
    id: user.id || makeUserId(user),
    name_kr: user.name_kr || '',
    name_en: user.name_en || '',
    dept: user.dept || '',
    role: user.role || '',
    password: user.password || String(user.name_en || '').trim().split(/\s+/)[0] || 'password',
    adminLevel: user.name_kr === REPRESENTATIVE_ADMIN_NAME && user.role === REPRESENTATIVE_ADMIN_ROLE
      ? 'superadmin'
      : (user.adminLevel === 'admin' || user.adminLevel === 'superadmin' ? user.adminLevel : 'user'),
  }));
}

function loadUserDirectory() {
  try {
    const parsed = JSON.parse(localStorage.getItem(USER_STORAGE_KEY));
    if (Array.isArray(parsed) && parsed.length > 0) return normalizeUsers(parsed);
  } catch(e) {}
  const seeded = normalizeUsers(USERS);
  localStorage.setItem(USER_STORAGE_KEY, JSON.stringify(seeded));
  if (window.queueCloudSync) window.queueCloudSync(USER_STORAGE_KEY, seeded);
  return seeded;
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function handleLogin(e) {
  e.preventDefault();
  await window.loginCloudReadyPromise;
  const name = document.getElementById('loginName').value.trim();
  const pw = document.getElementById('loginPw').value.trim();

  const user = loadUserDirectory().find(u => u.name_kr === name && u.password === pw);
  if (!user) {
    showError('errorMsg', '이름 또는 비밀번호가 올바르지 않습니다.');
    return;
  }

  // Save session
  sessionStorage.setItem('pi_user', JSON.stringify({
    userId: user.id,
    name_kr: user.name_kr,
    name_en: user.name_en,
    dept: user.dept,
    role: user.role,
    adminLevel: user.adminLevel,
    isAdmin: user.adminLevel === 'admin' || user.adminLevel === 'superadmin',
    loginAt: new Date().toISOString(),
  }));

  window.location.href = 'index.html';
}

function openAdminLogin() {
  document.getElementById('adminOverlay').classList.add('open');
  document.getElementById('adminPw').focus();
}
function closeAdminLogin() {
  document.getElementById('adminOverlay').classList.remove('open');
  document.getElementById('adminPw').value = '';
}

async function handleAdminLogin(e) {
  e.preventDefault();
  await window.loginCloudReadyPromise;
  const pw = document.getElementById('adminPw').value.trim();
  if (pw !== ADMIN_PASSWORD) {
    showError('adminError', '비밀번호가 올바르지 않습니다.');
    return;
  }
  sessionStorage.setItem('pi_user', JSON.stringify({
    userId: 'temp-admin',
    name_kr: '관리자',
    name_en: 'Admin',
    dept: 'mySUNI',
    role: '관리자',
    adminLevel: 'admin',
    isAdmin: true,
    loginAt: new Date().toISOString(),
  }));
  window.location.href = 'index.html';
}

window.loginCloudReadyPromise = (async function bootstrapLogin() {
  await window.initPiCloudSync?.({ seedDefaults: true });
  loadUserDirectory();
})();

// If already logged in, redirect
if (sessionStorage.getItem('pi_user')) {
  window.location.href = 'index.html';
}
</script>
</body>
